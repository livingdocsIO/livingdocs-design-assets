<text opacity="0.8" fill="#141414" style="white-space: pre" xml:space="preserve" font-family="Arial" font-size="14" letter-spacing="0em"><tspan x="157.5" y="153.354">High above the rooftops of Aarhus, a luminous circle hovers like a quiet horizon. It is here, </tspan><tspan x="157.5" y="174.354">on top of the ARoS Art Museum, that Olafur Eliasson has inscribed his Your rainbow </tspan><tspan x="157.5" y="195.354">panorama into the city&#x2019;s skyline, an artwork that is at once architecture, observation deck, </tspan><tspan x="157.5" y="216.354">and sensory experiment.</tspan></text>
<g clip-path="url(#clip4_4471_58455)">
<rect x="157.5" y="246" width="572" height="321.75" fill="#F0F0F0"/>
<g clip-path="url(#clip5_4471_58455)">
<line y1="-1" x2="660.872" y2="-1" transform="matrix(0.871576 0.490261 -0.38319 0.92367 155.5 246)" stroke="white" stroke-width="2"/>
<line y1="-1" x2="660.872" y2="-1" transform="matrix(0.871576 -0.490261 0.38319 0.92367 155.5 570)" stroke="white" stroke-width="2"/>
</g>
</g>
<text fill="#B8B8B8" style="white-space: pre" xml:space="preserve" font-family="Arial" font-size="11" letter-spacing="-0.01em"><tspan x="157.5" y="590.563">Caption</tspan></text>
<text opacity="0.8" fill="#141414" style="white-space: pre" xml:space="preserve" font-family="Arial" font-size="14" letter-spacing="0em"><tspan x="157.5" y="633.104">Eliasson, the Danish-Icelandic artist known for exploring light, perception, and the </tspan><tspan x="157.5" y="654.104">relationship between humans and their environment, conceived the installation as a </tspan><tspan x="157.5" y="675.104">walkable spectrum. A circular corridor of glass unfolds in every color of the rainbow, inviting </tspan><tspan x="157.5" y="696.104">visitors to step inside and move through shifting atmospheres of red, green, blue, and </tspan><tspan x="157.5" y="717.104">everything in between. With each step, the city below transforms: streets dissolve into tinted </tspan><tspan x="157.5" y="738.104">abstractions, familiar landmarks reappear as if filtered through emotion rather than optics.</tspan></text>
<text opacity="0.8" fill="#141414" style="white-space: pre" xml:space="preserve" font-family="Arial" font-size="14" letter-spacing="0em"><tspan x="157.5" y="783.104">What might first appear as a striking visual landmark reveals itself, on closer encounter, as a </tspan><tspan x="157.5" y="804.104">subtle investigation into how we see. The panorama does not simply frame Aarhus, it alters </tspan><tspan x="157.5" y="825.104">it. Visitors become participants in an ongoing interplay between body, space, and </tspan><tspan x="157.5" y="846.104">perception. The act of walking becomes a form of looking, and looking becomes a process </tspan><tspan x="157.5" y="867.104">shaped by color, movement, and awareness.</tspan></text>
</g>
