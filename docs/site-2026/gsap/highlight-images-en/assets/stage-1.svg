<text fill="#6E6E6E" style="white-space: pre" xml:space="preserve" font-family="SF Pro Text" font-size="10" font-weight="600" letter-spacing="0px"><tspan x="713.312" y="99.0547">VIDEO</tspan></text>
</g>
<text fill="#141414" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="14" letter-spacing="-0.01em"><tspan x="157.5" y="153.591">High above the rooftops of Aarhus, a luminous circle hovers like a quiet horizon. It is </tspan><tspan x="157.5" y="174.591">here, on top of the ARoS Art Museum, that Olafur Eliasson has inscribed his Your </tspan><tspan x="157.5" y="195.591">rainbow panorama into the city&#x2019;s skyline, an artwork that is at once architecture, </tspan><tspan x="157.5" y="216.591">observation deck, and sensory experiment.</tspan></text>
<text fill="#141414" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="14" letter-spacing="-0.01em"><tspan x="157.5" y="261.591">Eliasson, the Danish-Icelandic artist known for exploring light, perception, and the </tspan><tspan x="157.5" y="282.591">relationship between humans and their environment, conceived the installation as a </tspan><tspan x="157.5" y="303.591">walkable spectrum. A circular corridor of glass unfolds in every color of the rainbow, </tspan><tspan x="157.5" y="324.591">inviting visitors to step inside and move through shifting atmospheres of red, green, </tspan><tspan x="157.5" y="345.591">blue, and everything in between. With each step, the city below transforms: streets </tspan><tspan x="157.5" y="366.591">dissolve into tinted abstractions, familiar landmarks reappear as if filtered through </tspan><tspan x="157.5" y="387.591">emotion rather than optics.</tspan></text>
<text fill="#141414" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="14" letter-spacing="-0.01em"><tspan x="157.5" y="432.591">What might first appear as a striking visual landmark reveals itself, on closer encounter, </tspan><tspan x="157.5" y="453.591">as a subtle investigation into how we see. The panorama does not simply frame Aarhus, </tspan><tspan x="157.5" y="474.591">it alters it. Visitors become participants in an ongoing interplay between body, space, </tspan><tspan x="157.5" y="495.591">and perception. The act of walking becomes a form of looking, and looking becomes a </tspan><tspan x="157.5" y="516.591">process shaped by color, movement, and awareness.</tspan></text>
<text fill="#141414" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="14" letter-spacing="-0.01em"><tspan x="157.5" y="561.591">Since its opening in 2011, the installation has become both a defining symbol of the </tspan><tspan x="157.5" y="582.591">museum and a new vantage point on the city itself. Yet its true impact lies less in its </tspan><tspan x="157.5" y="603.591">iconic silhouette than in the quiet shift it produces: a reminder that reality is never fixed, </tspan><tspan x="157.5" y="624.591">but always filtered&#x2014;through light, through context, and through the human eye.</tspan></text>
