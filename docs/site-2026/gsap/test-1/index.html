<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="https://codepen.io/GreenSock/pen/xxmzBrw.css">
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        min-height: 100vh;
        gap: 1rem;
      }

      .box {
        display: block;
        border: 0 solid transparent;
        transition: border .5s;

        &:hover {
          border: 10px solid white;
        }
      }

      .pink {
        background-color: pink;
      }
    </style>
  </head>
  <body>
    <div class="box box1 green"></div>
    <div class="box box2 orange"></div>
    <div class="box box3 purple"></div>

    <script>
      var tl = gsap.timeline({delay: 1, repeat: -1, yoyo: true});
      //sequenced one-after-the-other
      tl.to(".box1", {duration: 1, rotation: -360})
        .to(".box2", {duration: 2, x: -100, ease: 'elastic.out'})
        .to(".box1", { x: 200, duration: 1 }, 3)
        .to(".box2", { y: 200, duration: 1 }, 3);

      var tl2 = gsap.timeline({delay: 1, repeat: -1, yoyo: true});
      //sequenced one-after-the-other
      tl2.to(".box3", {duration: 2, rotation: 360, x: 100, ease: 'expo.out'});
    </script>
  </body>
</html>
