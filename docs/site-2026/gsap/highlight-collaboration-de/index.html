<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
		<script src="../asset-resolver.js"></script>
		<style>
			body {
				margin: 0;
				background: transparent;
			}

			#animation {
				position: relative;
				width: 100%;
			}

			#stage-image,
			.drop-in-image {
				display: block;
				width: 100%;
				height: auto;
			}

			#stage-image {
				position: relative;
				z-index: 1;
			}

			.drop-in-image {
				position: absolute;
				inset: 0;
				opacity: 0;
				pointer-events: none;
				transform-origin: 50% 50%;
			}

			#drop-in-1 {
				z-index: 2;
			}

			#drop-in-2 {
				z-index: 3;
			}

			#drop-in-3 {
				z-index: 4;
			}

		#drop-in-4 {
			z-index: 5;
		}

		#drop-in-5 {
			z-index: 6;
		}

		#drop-in-6 {
			z-index: 7;
			transform-origin: 76.11% 85.77%;
		}
		</style>
	</head>
	<body>
		<div id="animation">
			<img id="stage-image" src="assets/stage-1.svg" alt="Animated collaboration interface" />
			<img id="drop-in-1" class="drop-in-image" src="assets/drop-in-stage-1.svg" alt="" aria-hidden="true" />
			<img id="drop-in-2" class="drop-in-image" src="assets/drop-in-stage-2.svg" alt="" aria-hidden="true" />
			<img id="drop-in-3" class="drop-in-image" src="assets/drop-in-stage-3.svg" alt="" aria-hidden="true" />
			<img id="drop-in-4" class="drop-in-image" src="assets/drop-in-stage-4.svg" alt="" aria-hidden="true" />
			<img id="drop-in-5" class="drop-in-image" src="assets/drop-in-stage-5.svg" alt="" aria-hidden="true" />
		<img id="drop-in-6" class="drop-in-image" src="assets/pop-up-stage-1.png" alt="" aria-hidden="true" />

    <script src="../highlight-collaboration/shared.js"></script>
	</body>
</html>
