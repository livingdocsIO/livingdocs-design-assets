<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
		<script src="../asset-resolver.js"></script>
		<style>
			body {
				margin: 0;
				background: transparent;
			}

			#animation {
				position: relative;
				width: 100%;
			}

			#stage-image,
			.overlay-image,
			.user-layer {
				display: block;
				width: 100%;
				height: auto;
			}

			#stage-image {
				position: relative;
				z-index: 1;
			}

			.overlay-image {
				position: absolute;
				inset: 0;
				opacity: 0;
				pointer-events: none;
				z-index: 2;
				transform-origin: 50% 50%;
			}

			.dragged-image {
				position: absolute;
				/* 314 / 119 = 263.87% (dragged asset width relative to Leo wrapper width) */
				width: 263.87%;
				aspect-ratio: 314 / 74;
				left: -20.4%;
				top: -62.1%;
				opacity: 0;
				pointer-events: none;
				z-index: 0;
				transform-origin: 50% 50%;
			}

			.user-actor {
				position: absolute;
				/* 119 / 758 = 15.70% (user composite asset against full stage width) */
				width: 15.70%;
				aspect-ratio: 119 / 83;
				opacity: 0;
				pointer-events: none;
				z-index: 3;
			}

			.user-layer {
				position: absolute;
				z-index: 1;
			}

			#leo-cursor {
				left: 0%;
				top: 0%;
				width: 39.5%;
				height: 63.9%;
				transform-origin: 30% 100%;
			}

			#leo-label {
				left: 53%;
				top: 58.1%;
				width: 46.2%;
				height: 41%;
			}

			#zoe-cursor {
				left: 45.4%;
				top: 0%;
				width: 39.5%;
				height: 65.1%;
				transform-origin: 70% 100%;
			}

			#zoe-label {
				left: 0%;
				top: 58.1%;
				width: 47.9%;
				height: 41%;
			}

			#user-leo {
				z-index: 4;
			}

			#user-zoe {
				z-index: 5;
			}

			.click-indicator {
				position: absolute;
				/* 3.2% × (624 / 758) = 2.64% (matched to highlight-assistants-en at its stage width) */
				width: 2.64%;
				aspect-ratio: 1 / 1;
				opacity: 0;
				pointer-events: none;
				z-index: 6;
				transform-origin: 50% 50%;
				border-radius: 50%;
				background-color: #141414;
				transform: translate(-50%, -50%);
			}
		</style>
	</head>
	<body>
		<div id="animation">
			<img id="stage-image" src="assets/stage-1.svg" alt="Animated image showcase" />
			<img id="drop-in-image" class="overlay-image" src="assets/drop-in-stage-1.svg" alt="" aria-hidden="true" />

			<div id="user-leo" class="user-actor" aria-hidden="true">
				<img id="dragged-image" class="dragged-image" src="assets/dragged-1.svg" alt="" aria-hidden="true" />
				<img id="leo-cursor" class="user-layer" src="../assets/shared/user-leo-cursor.svg" alt="" />
				<img id="leo-label" class="user-layer" src="../assets/shared/user-leo-label.svg" alt="" />
			</div>

			<div id="user-zoe" class="user-actor" aria-hidden="true">
				<img id="zoe-cursor" class="user-layer" src="../assets/shared/user-zoe-cursor.svg" alt="" />
				<img id="zoe-label" class="user-layer" src="../assets/shared/user-zoe-label.svg" alt="" />
			</div>

			<div id="click-leo" class="click-indicator" aria-hidden="true"></div>
			<div id="click-zoe" class="click-indicator" aria-hidden="true"></div>
		</div>

    <script src="../highlight-images/shared.js"></script>
	</body>
</html>
