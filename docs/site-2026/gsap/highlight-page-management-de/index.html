<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
		<script src="../asset-resolver.js"></script>
		<style>
			body {
				margin: 0;
				background: transparent;
			}

			#animation {
				position: relative;
				width: 100%;
				opacity: 1;
			}

			#stage-image {
				display: block;
				width: 100%;
				height: auto;
			}

			#cursor-image {
				position: absolute;
				top: 0;
				left: 0;
				width: 7.63%;
				height: auto;
				opacity: 0;
				pointer-events: none;
				z-index: 3;
				transform-origin: 0% 0%;
			}

			#cursor-click {
				position: absolute;
				width: 3.12%;
				aspect-ratio: 1;
				border-radius: 50%;
				opacity: 0;
				pointer-events: none;
				z-index: 2;
				transform: translate(-50%, -50%);
				background-color: #141414;
			}
		</style>
	</head>
	<body>
		<div id="animation">
			<img id="stage-image" src="assets/stage-1.svg" alt="Animated page management teaser comparison" />
			<img id="cursor-image" src="../assets/shared/user-2.svg" alt="" aria-hidden="true" />
			<div id="cursor-click" aria-hidden="true"></div>
		</div>

    <script src="../highlight-page-management/shared.js"></script>
	</body>
</html>
